services:

  # ─── Blog (Nuxt 3 SSG + Nginx) ────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: blog-masia-antoine
    ports:
      - "3001:80"
    restart: unless-stopped
    environment:
      - NUXT_PUBLIC_SITE_URL=https://blog.masia-antoine.fr
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/robots.txt"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "com.blog.description=Blog Antoine Masia — Nuxt 3 SSG"
