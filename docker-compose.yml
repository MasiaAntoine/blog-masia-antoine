services:
  web:
    image: node:20-slim
    container_name: blog-masia-antoine-dev
    working_dir: /app
    ports:
      - "3001:3000"
    volumes:
      # Code source monté en direct → HMR actif, aucun rebuild nécessaire
      - .:/app
      # Volume anonyme pour node_modules → isolé du host
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - NUXT_PUBLIC_SITE_URL=http://localhost:3001
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - NUXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NUXT_PUBLIC_SUPABASE_KEY=${SUPABASE_KEY}
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=3000
    command: sh -c "npm install --legacy-peer-deps && npm run dev"
    labels:
      - "com.blog.description=Blog Antoine Masia — Nuxt DEV (HMR)"
